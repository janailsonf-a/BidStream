services:
  mysql:
    image: mysql:8.0
    container_name: bidstream_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: bidstream
      MYSQL_USER: bidstream
      MYSQL_PASSWORD: bidstream
    ports:
      - "3307:3306"
    volumes:
      - bidstream_mysql_data:/var/lib/mysql
    networks:
      - bidstream_network

  redis:
    image: redis:7-alpine
    container_name: bidstream_redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    networks:
      - bidstream_network

volumes:
  bidstream_mysql_data:

networks:
  bidstream_network:
    driver: bridge
